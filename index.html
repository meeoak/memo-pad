<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#222222">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="플래너">
  <title>플래너</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&family=Gaegu:wght@300;400;700&family=Gamja+Flower&family=Hi+Melody&family=Jua&family=Poor+Story&family=Single+Day&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=24">
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <span class="toolbar-title" id="toolbarTitle">WEEKLY</span>
      <div class="toolbar-center">
        <button type="button" class="nav-btn" id="btnPrev" aria-label="이전 주">‹</button>
        <button type="button" class="today-btn" id="btnToday">오늘</button>
        <button type="button" class="nav-btn" id="btnNext" aria-label="다음 주">›</button>
      </div>
      <span class="current-label" id="currentLabel"></span>
      <div class="week-progress" id="weekProgress">
        <span class="progress-label" id="progressLabel">0/0 · 0%</span>
        <div class="progress-bar" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <button type="button" class="carry-btn" id="btnCarryToday" title="오늘 미완료 항목을 내일로">오늘 → 내일</button>
      <button type="button" class="carry-btn" id="btnCarryWeek" title="이번 주 미완료를 다음 주로">주 → 다음주</button>
      <button type="button" class="notif-btn" id="btnNotif" title="알림 설정" aria-label="알림 설정">🔔</button>
      <div class="toolbar-right">
        <label class="theme-select-wrap">
          <span class="sr-only">테마</span>
          <select id="themeSelect" class="theme-select" title="테마 선택">
            <option value="minimal">미니멀</option>
            <option value="pastel">파스텔</option>
            <option value="dark">다크</option>
          </select>
        </label>
        <span class="save-status save-status-saved" id="saveStatus" aria-live="polite">저장됨</span>
      </div>
    </header>

    <dialog class="notif-dialog" id="notifDialog">
      <form method="dialog" class="notif-dialog-inner">
        <header class="notif-dialog-head">
          <h2>알림 설정</h2>
          <button type="button" class="notif-close" id="btnNotifClose" aria-label="닫기">×</button>
        </header>
        <p class="notif-status" id="notifStatus"></p>
        <label class="notif-row notif-row-master">
          <input type="checkbox" id="notifEnabled"> 알림 켜기 (페이지 열림 시)
        </label>
        <fieldset class="notif-group">
          <legend>1차 · 로컬 알림</legend>
          <label class="notif-row">
            <span><input type="checkbox" id="notifMorningEnabled"> 오늘 계획 세우기</span>
            <input type="time" id="notifMorningTime" value="08:00">
          </label>
          <label class="notif-row">
            <span><input type="checkbox" id="notifEveningEnabled"> 저녁 회고 (SEE)</span>
            <input type="time" id="notifEveningTime" value="21:00">
          </label>
          <label class="notif-row">
            <input type="checkbox" id="notifBlockEnabled"> 시간 블록 시작 10분 전
          </label>
        </fieldset>
        <fieldset class="notif-group">
          <legend>2차 · PWA</legend>
          <p class="notif-hint" id="pwaInstallHint"></p>
          <button type="button" class="carry-btn" id="btnInstallPwa" hidden>홈 화면에 설치</button>
        </fieldset>
        <fieldset class="notif-group notif-group-future">
          <legend>3차 · 푸시 (준비 중)</legend>
          <p class="notif-hint">앱이 닫혀 있어도 알림을 받으려면 서버(Web Push · VAPID)가 필요합니다. service-worker에 훅만 준비해 두었습니다.</p>
        </fieldset>
        <footer class="notif-actions">
          <button type="button" class="carry-btn" id="btnNotifEnable">알림 권한 허용</button>
          <button type="button" class="carry-btn" id="btnNotifTest">테스트 알림</button>
        </footer>
      </form>
    </dialog>

    <main class="main-area">
      <div class="weekly-layout sheet">
        <header class="weekly-top">
          <div class="tag-section top-panel top-panel-work">
            <h3 class="tag-head">#WORK</h3>
            <ul class="tag-list" id="workList"></ul>
            <button type="button" class="tag-add-btn" id="btnAddWork">+ 행 추가</button>
          </div>
          <div class="tag-section top-panel top-panel-life">
            <h3 class="tag-head">#LIFE</h3>
            <ul class="tag-list" id="lifeList"></ul>
            <button type="button" class="tag-add-btn" id="btnAddLife">+ 행 추가</button>
          </div>
          <div class="habit-section top-panel top-panel-habit" id="habitTracker"></div>
          <div class="top-cal top-panel top-panel-cal" id="sidebarCal"></div>
          <div class="deferred-panel" id="deferredPanel" hidden>
            <h3 class="tag-head">미룬 업무</h3>
            <ul class="deferred-list" id="deferredList"></ul>
          </div>
        </header>
        <div class="memo-style-bar" id="memoStyleBar" aria-label="메모 꾸미기"></div>
        <div class="weekly-days" id="weeklyColumns"></div>
      </div>
    </main>
  </div>
  <script src="memo-style.js?v=24"></script>
  <script src="app.js?v=24"></script>
  <script src="notifications.js?v=24"></script>
</body>
</html>
