name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "content-desk/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_STATIC_HOST: "true"

      - name: Publish static files
        run: |
          rm -rf content-desk
          cp -r out content-desk

      - name: Commit deployment
        uses: EndBug/add-and-commit@v9
        with:
          add: content-desk
          message: "chore: update content-desk deployment [skip ci]"
          author_name: github-actions[bot]
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
